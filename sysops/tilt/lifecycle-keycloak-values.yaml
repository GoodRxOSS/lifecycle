parentChartName: lifecycle

realm: lifecycle
realmDisplayName: Lifecycle
hostname: http://localhost:8081
hostnameStrict: false

clients:
  lifecycleUi:
    url: http://localhost:3000

companyIdp:
  enabled: true
  tokenUrl: http://lifecycle-keycloak-service.lifecycle-app.svc.cluster.local:8080/realms/internal/protocol/openid-connect/token
  authorizationUrl: http://localhost:8081/realms/internal/protocol/openid-connect/auth
  jwksUrl: http://lifecycle-keycloak-service.lifecycle-app.svc.cluster.local:8080/realms/internal/protocol/openid-connect/certs
  logoutUrl: http://localhost:8081/realms/internal/protocol/openid-connect/logout
  issuer: http://localhost:8081/realms/internal

githubIdp:
  enabled: true
  githubJsonFormat: true

internalIdp:
  internalUrl: http://lifecycle-keycloak-service.lifecycle-app.svc.cluster.local:8080
  mapAdminRole: true
  users:
    bootstrapUser:
      username: lifecycle
      email: lifecycle@example.com
      firstName: Lifecycle
      lastName: Bootstrap
      password: lifecycle
      credsTemp: false

ingress:
  enabled: false
  tls: false

secrets:
  bootstrapAdmin:
    username: admin
    password: admin
  postgres:
    adminPassword: keycloakdb
    userPassword: keycloakdb
  githubIdp:
    enabled: false
  lifecycleUi:
    clientSecret: changeme

keycloakPostgres:
  nameOverride: postgres
  primary:
    persistence:
      enabled: false

# MCP server realm setup: audience-bound `mcp` scope + anonymous DCR policies.
# Primary audience = in-cluster web via Tilt port-forward; extra = host `pnpm dev`.
mcp:
  enabled: true
  resourceUrl: http://localhost:5001/mcp
  extraAudiences:
    - http://localhost:3000/mcp
  dcr:
    # Local Keycloak is not public; keep anonymous DCR on so clients self-register in dev.
    enabled: true
